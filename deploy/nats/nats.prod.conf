# SyftHub NATS Server - Production Configuration
# Provides pub/sub messaging for P2P communication between SyftAI Spaces

server_name: syfthub-nats

# Client connections (internal Docker network)
listen: 0.0.0.0:4222

# HTTP monitoring endpoint
http_port: 8222

# WebSocket for browser/external clients (proxied via nginx with TLS termination)
websocket {
    port: 9222
    no_tls: true
    compression: true
}

# JetStream - persistent messaging
jetstream {
    store_dir: /data/jetstream
    max_memory_store: 1GB
    max_file_store: 10GB
}

# Logging
debug: false
trace: false
logtime: true

# Connection limits
max_connections: 4096
max_payload: 1MB
ping_interval: "30s"

# Accounts. End-user connections (hosts, clients) are placed in SYFTHUB; the
# nats-auth callout service connects under AUTH and is exempt from the callout.
accounts {
    SYFTHUB {
        jetstream: enabled
    }
    AUTH {
        users: [
            { user: $NATS_AUTH_SERVICE_USER, password: $NATS_AUTH_SERVICE_PASSWORD }
        ]
    }
}

# Auth-callout: every connection except the AUTH service user is authorized by
# the nats-auth service, which validates the presented token (service / host /
# peer) and signs a subject-scoped user JWT. See components/nats-auth/.
authorization {
    auth_callout {
        issuer: $NATS_CALLOUT_ISSUER
        account: AUTH
        auth_users: [ $NATS_AUTH_SERVICE_USER ]
    }
}
