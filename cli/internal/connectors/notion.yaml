meta:
  id: notion
  name: "Notion"
  description: "Connect to Notion workspaces and databases"
  category: productivity
  tags: [notion, database, documents, productivity]

steps:
  - id: notion_auth
    type: oauth2
    name: "Connect to Notion"
    required: true
    oauth2:
      auth_url: "https://api.notion.com/v1/oauth/authorize"
      token_url: "https://api.notion.com/v1/oauth/token"
      scopes: []
      extra_params:
        owner: "user"
    outputs:
      NOTION_ACCESS_TOKEN: "{{response.access_token}}"
      NOTION_WORKSPACE_ID: "{{response.workspace_id}}"

  - id: list_databases
    type: http
    name: "Fetching your Notion databases..."
    depends_on: [notion_auth]
    http:
      method: POST
      url: "https://api.notion.com/v1/search"
      headers:
        Authorization: "Bearer {{steps.notion_auth.outputs.NOTION_ACCESS_TOKEN}}"
        Notion-Version: "2022-06-28"
      json:
        filter:
          value: "database"
          property: "object"
      expect_status: 200

  - id: pick_database
    type: select
    name: "Select Notion database"
    depends_on: [list_databases]
    required: true
    env_key: NOTION_DATABASE_ID
    select:
      options_from:
        step_id: list_databases
        path: "results"
        value_field: "id"
        label_field: "title[0].plain_text"
