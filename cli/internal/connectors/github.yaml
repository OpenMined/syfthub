meta:
  id: github
  name: "GitHub"
  description: "Access repositories and manage webhooks on GitHub"
  category: development
  tags: [github, git, repositories, webhooks]

steps:
  - id: github_auth
    type: oauth2
    name: "Connect to GitHub"
    required: true
    oauth2:
      auth_url: "https://github.com/login/oauth/authorize"
      token_url: "https://github.com/login/oauth/access_token"
      scopes: ["repo", "admin:repo_hook"]
    outputs:
      GITHUB_ACCESS_TOKEN: "{{response.access_token}}"

  - id: list_repos
    type: http
    name: "Fetching your repositories..."
    depends_on: [github_auth]
    http:
      method: GET
      url: "https://api.github.com/user/repos"
      headers:
        Authorization: "Bearer {{steps.github_auth.outputs.GITHUB_ACCESS_TOKEN}}"
        Accept: "application/vnd.github.v3+json"
      query:
        sort: "updated"
        per_page: "50"
      expect_status: 200

  - id: pick_repo
    type: select
    name: "Select repository"
    depends_on: [list_repos]
    required: true
    env_key: GITHUB_REPO_FULL_NAME
    select:
      options_from:
        step_id: list_repos
        path: ""
        value_field: "full_name"
        label_field: "full_name"
